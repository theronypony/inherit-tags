name: Release

# Build, attest, and publish the plugin whenever a version tag is pushed.
# Obsidian's release convention is a bare semver tag (e.g. "1.0.1", no "v" prefix).
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write # create the GitHub release and upload assets
  id-token: write # required for build provenance attestations
  attestations: write # write the attestation to the attestations API

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify manifest version matches tag
        run: |
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$manifest_version" != "${GITHUB_REF_NAME}" ]; then
            echo "manifest.json version ($manifest_version) does not match tag (${GITHUB_REF_NAME})" >&2
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            main.js manifest.json styles.css \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
